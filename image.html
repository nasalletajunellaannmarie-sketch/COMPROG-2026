<style>
* {
  box-sizing: border-box;
}

body {
  font-family: "sans-serif";
  padding: 10px;
  background: #1600ba;
  font-size: 18px;
}

/* Header */
.header {
  position: relative;
  padding: 30px;
  text-align: center;
  background-image: url("stem_img.jpg");
  background-size: cover;
  background-position: center;
  height: 270px;
  transition: all 0.8s ease;
}

.header:hover {
  background-image: url("stem_img.jpg"); 
  background-color: white;
  height: 400px;
}

.header img {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  padding: 10px;
  margin-top: 20px;
  transition: opacity 0.5s ease;
}

.header:hover img {
  opacity: 0;
}

/* NAVIGATION BAR */

.topnav{
background:#002183;
display:flex;
flex-wrap:wrap;
}

.topnav a{
color:white;
padding:12px;
text-decoration:none;
flex:1;
text-align:center;
font-weight:bold;
}

.topnav a:hover{
background:#fdfd83;
color:navy;
}

/* Move the last link (Game) to the right */
.topnav a.game-link {
  margin-left: auto;
}

/* ===== GALLERY SECTION ===== */

.row {
  margin-top: 20px;
}

/* Gallery Columns */
.column {
  float: left;
  width: 33.33%;
  padding: 8px;
}

.row:after {
  content: "";
  display: table;
  clear: both;
}

.content {
background:linear-gradient(135deg,#002183,#3191ff);
  padding: 10px;
  border-radius: 10px;
}

.content img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

.box1 {
  width: 1480px;
  height: 100px;
  background-color: #1600ba;
  background-repeat: no-repeat;
  background-size: cover;
  color:white;
  border-radius:10px;
  text-align: center;
}

/* Footer */
footer {
  background-color: #f9f7f7;
  color: rgb(68, 68, 68);
  text-align: center;
  font-size: 15px;
  padding: 5px;
  height: 200px;
  border-radius:10px;
}

.footer-logo {
  width: 175px;      
  height: 25px;
  margin-bottom: 10px;
}

/* Responsive */
@media screen and (max-width: 800px) {
  .column {
    width: 100%;
  }

  .box1 {
    text-align: left;
  }
}
</style>
